<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VALORANT Coach Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>VALORANT Coach Agent</h1>
        <p>Local post-match review for deaths, positioning, and repeat mistakes.</p>
      </div>
      <div class="topbar-actions">
        <span id="versionBadge" class="version-badge" title="Current app build">Version loading...</span>
        <button id="refreshBtn" class="icon-button" title="Refresh matches">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar-dashboard">
        <nav class="side-tabs" aria-label="Dashboard sections">
          <button class="side-tab active" type="button" data-tab-target="tab-recordings">Recordings</button>
          <button class="side-tab" type="button" data-tab-target="tab-matches">Matches</button>
          <button class="side-tab" type="button" data-tab-target="tab-status">Status</button>
          <button class="side-tab" type="button" data-tab-target="tab-memory">Memory</button>
          <button class="side-tab" type="button" data-tab-target="tab-tools">Tools</button>
        </nav>

        <section id="tab-recordings" class="tab-panel active">
          <h2>Recordings</h2>
          <label>
            Recording folder
            <input id="recordingDir" type="text" placeholder="C:\Users\hjr\Videos\Valorant" />
          </label>
          <div class="row">
            <button id="saveSettingsBtn">Save</button>
            <button id="scanBtn">Scan Folder</button>
          </div>
          <label>
            Import one video
            <input id="videoPath" type="text" placeholder="Full path to .mp4 or .mkv" />
          </label>
          <button id="importBtn">Import Video</button>
        </section>

        <section id="tab-matches" class="tab-panel">
          <h2>Matches</h2>
          <div id="matchesList" class="matches-list"></div>
        </section>

        <section id="tab-memory" class="tab-panel">
          <h2>Coach Memory</h2>
          <div id="coachView" class="coach-view"></div>
        </section>

        <section id="tab-status" class="tab-panel">
          <h2>Player Status</h2>
          <div class="memory-trends">
            <div id="trendsView" class="trends-view"></div>
          </div>
        </section>

        <section id="tab-tools" class="tab-panel">
          <h2>Tools</h2>
          <details>
            <summary>Calibration</summary>
            <div id="capabilitiesView" class="capabilities-view"></div>
            <div id="calibrationView" class="calibration-view"></div>
            <button id="saveCalibrationBtn" class="secondary">Save Calibration</button>
          </details>
          <details>
            <summary>Automation And Local AI</summary>
            <div id="automationView" class="automation-view"></div>
          </details>
        </section>
      </aside>

      <section class="panel report">
        <h2>Review</h2>
        <div id="reportView" class="report-view">
          <p class="muted">Select a match and click Review.</p>
        </div>
      </section>
    </main>

    <div id="status" class="status" role="status" aria-live="polite">Ready.</div>

    <script src="/static/api.js"></script>
    <script src="/static/ui_helpers.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
